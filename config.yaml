# DocPipe Configuration
# Paths
input_dir: "./input"
output_dir: "./output"

# Watcher
watcher:
  enabled: true
  debounce_seconds: 60
  max_wait_seconds: 300
  poll_interval_seconds: 1
  watch_subdirectories: false

# Converter (LibreOffice)
converter:
  libreoffice_path: null
  timeout_seconds: 120
  supported_extensions:
    - .doc
    - .docx
    - .xls
    - .xlsx
    - .ppt
    - .pptx
    - .odt
    - .ods
    - .odp
    - .rtf
    - .html
    - .epub

# Extractor (PyMuPDF4LLM)
extractor:
  write_images: true
  image_format: "png"
  dpi: 150

# Describer (vision LLM)
describer:
  provider: "openai"            # "openai", "azure", or "anthropic"
  max_tokens: 300
  include_context: true
  context_chars: 500
  batch_size: 5

  openai:
    model: "gpt-4o-mini"
  azure:
    model: "gpt-4o-mini"
    endpoint: ""                # Set to your Azure endpoint
    deployment: ""              # Set to your Azure deployment name
    api_version: "2024-06-01"
  anthropic:
    model: "claude-haiku-4-5-20251001"

# Registry
registry:
  filename: "registry.md"
  summary_max_words: 30
  include_fields:
    - filename
    - author
    - date
    - summary
    - topics
    - pages
    - images

# Knowledge Graph (LightRAG) — OpenAI or Azure only
graph:
  provider: "openai"            # "openai" or "azure" (no anthropic — no embedding API)
  storage: "file"
  store_dir: "./output/lightrag_store"
  max_tokens: 4096
  chunk_size: 1200
  chunk_overlap: 100

  openai:
    model: "gpt-4o-mini"
    embedding_model: "text-embedding-3-small"
    embedding_dim: 1536
  azure:
    model: "gpt-4o-mini"
    embedding_model: "text-embedding-3-small"
    embedding_dim: 1536
    endpoint: ""
    deployment: ""
    embedding_deployment: ""
    api_version: "2024-06-01"

# API retry (applies to all provider calls)
api_retry:
  max_retries: 3
  initial_delay_seconds: 1
  max_delay_seconds: 30

# Logging
logging:
  level: "INFO"
  file: "./logs/docpipe.log"
  max_size_mb: 50
  backup_count: 3
