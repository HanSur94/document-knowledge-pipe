name: Document Type Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  doc-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install LibreOffice (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer libreoffice-calc libreoffice-impress

      - name: Install LibreOffice (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install libreoffice-fresh -y --no-progress

      - run: uv sync --dev

      - name: Run document type tests
        run: uv run pytest tests/test_doctypes.py -v --tb=short

  e2e-anthropic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - run: uv sync --dev

      - name: Run E2E test with Anthropic + LLM judge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run pytest tests/test_e2e_anthropic.py -v --tb=short

  example-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer libreoffice-calc libreoffice-impress

      - run: uv sync --dev

      - name: Ingest all example documents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        working-directory: examples
        run: uv run docpipe ingest --config config.yaml

      - name: Verify outputs exist
        working-directory: examples
        run: |
          echo "=== Markdown files ==="
          ls -lh output/markdown/

          md_count=$(ls output/markdown/*.md 2>/dev/null | wc -l)
          echo "Markdown files generated: $md_count"

          if [ "$md_count" -lt 1 ]; then
            echo "ERROR: No markdown files generated"
            exit 1
          fi

          echo ""
          echo "=== Registry ==="
          if [ -f output/registry.md ]; then
            echo "Registry exists"
            head -20 output/registry.md
          else
            echo "ERROR: registry.md not found"
            exit 1
          fi

          echo ""
          echo "=== Status ==="
          if [ -f output/status.json ]; then
            echo "status.json exists"
            cat output/status.json
          else
            echo "ERROR: status.json not found"
            exit 1
          fi

      - name: Check status command
        working-directory: examples
        run: uv run docpipe status --config config.yaml

  full-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer libreoffice-calc libreoffice-impress

      - run: uv sync --dev

      - name: Full system test — real-world docs + Anthropic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run pytest tests/test_full_system.py -v --tb=short

  graph-query:
    needs: [e2e-anthropic]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - run: uv sync --dev

      # This test ingests sample.pdf (calls OpenAI embedding API),
      # then queries the graph and judges the answer with Claude Haiku.
      - name: Graph query E2E test with LLM judge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run pytest tests/test_graph_query.py -v --tb=short
