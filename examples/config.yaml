# Example DocPipe Configuration
# Copy this file and adjust paths for your setup

input_dir: ./input
output_dir: ./output

# Watcher
watcher:
  enabled: true
  debounce_seconds: 60
  max_wait_seconds: 300

# Describer — choose your LLM provider
describer:
  # Set provider to "openai", "azure", or "anthropic"
  provider: "openai"
  max_tokens: 300
  include_context: true
  context_chars: 500

  openai:
    model: "gpt-4o-mini"

  # azure:
  #   model: "gpt-4o-mini"
  #   endpoint: "https://YOUR-INSTANCE.openai.azure.com"
  #   deployment: "YOUR-DEPLOYMENT"
  #   api_version: "2024-06-01"

  # anthropic:
  #   model: "claude-haiku-4-5-20251001"

# Knowledge Graph (OpenAI or Azure only)
graph:
  provider: "openai"
  storage: "file"
  store_dir: "./output/lightrag_store"

  openai:
    model: "gpt-4o-mini"
    embedding_model: "text-embedding-3-small"
    embedding_dim: 1536

# Logging
logging:
  level: "INFO"
  file: "./logs/docpipe.log"
